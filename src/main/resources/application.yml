server:
  port: 8080

spring:
  application:
    name: mysoftpos-backend

  # --- H2 for development (switch to MySQL for production) ---
  # datasource:
  #   url: jdbc:h2:file:./data/mysoftpos_db;AUTO_SERVER=TRUE
  #   driver-class-name: org.h2.Driver
  #   username: sa
  #   password:
  #
  # h2:
  #   console:
  #     enabled: true
  #     path: /h2-console

  # --- MySQL for production (uncomment and replace H2 above) ---
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mysoftpos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:Dungtimanhnua123@}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000        # 5 min
      connection-timeout: 10000   # 10 sec
      max-lifetime: 1800000       # 30 min
  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 20
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect

# --- JWT Config ---
app:
  jwt:
    secret: ${APP_JWT_SECRET:MySoftPOS-Secret-Key-PA-DSS-Compliant-2025-Must-Be-At-Least-256-Bits-Long!!}
    access-token-expiration: 3600000    # 1 hour
    refresh-token-expiration: 604800000 # 7 days

# --- Swagger ---
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
