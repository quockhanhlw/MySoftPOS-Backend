server:
  port: 8080

spring:
  application:
    name: mysoftpos-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mysoftpos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:Dungtimanhnua123@}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000        # 5 min
      connection-timeout: 10000   # 10 sec
      max-lifetime: 1800000       # 30 min
  h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:false}
      path: /h2-console
  jpa:
    open-in-view: false
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 20
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}

app:
  jwt:
    secret: ${APP_JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET_IN_ENV}
    access-token-expiration: 3600000    # 1 hour
    refresh-token-expiration: 604800000 # 7 days

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
