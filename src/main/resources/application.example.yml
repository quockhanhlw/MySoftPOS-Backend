server:
  port: 8080

spring:
  application:
    name: mysoftpos-backend

  datasource:
    # Runtime default: MySQL. Override via env vars in each environment.
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mysoftpos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:YOUR_MYSQL_PASSWORD_HERE}
  h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:false}
      path: /h2-console
  jpa:
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}

app:
  jwt:
    secret: ${APP_JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET_IN_ENV}
    access-token-expiration: 3600000
    refresh-token-expiration: 604800000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
