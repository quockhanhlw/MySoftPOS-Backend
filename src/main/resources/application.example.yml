server:
  port: 8080

spring:
  application:
    name: mysoftpos-backend

  # --- H2 for development (switch to MySQL for production) ---
  # datasource:
  #   url: jdbc:h2:file:./data/mysoftpos_db;AUTO_SERVER=TRUE
  #   driver-class-name: org.h2.Driver
  #   username: sa
  #   password:
  #
  # h2:
  #   console:
  #     enabled: true
  #     path: /h2-console

  # --- MySQL for production (uncomment and replace H2 above) ---
  datasource:
    url: jdbc:mysql://localhost:3306/mysoftpos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: "YOUR_MYSQL_PASSWORD_HERE"
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect

# --- JWT Config ---
app:
  jwt:
    secret: YOUR_SECRET_KEY_HERE_MUST_BE_LONG_ENOUGH
    access-token-expiration: 3600000    # 1 hour
    refresh-token-expiration: 604800000 # 7 days

# --- Swagger ---
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
