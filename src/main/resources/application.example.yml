server:
  port: ${PORT:8080}

spring:
  application:
    name: mysoftpos-backend

  datasource:
    # Inject the real Aiven JDBC URL via env var.
    # Example: jdbc:mysql://YOUR_AIVEN_HOST:YOUR_AIVEN_PORT/YOUR_DATABASE?sslMode=REQUIRED&serverTimezone=UTC&allowPublicKeyRetrieval=true
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://YOUR_AIVEN_HOST:YOUR_AIVEN_PORT/YOUR_DATABASE?sslMode=REQUIRED&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:YOUR_AIVEN_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD:YOUR_AIVEN_PASSWORD}
  jpa:
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}

app:
  jwt:
    secret: ${APP_JWT_SECRET:YOUR_LONG_RANDOM_JWT_SECRET}
    access-token-expiration: 3600000
    refresh-token-expiration: 604800000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
