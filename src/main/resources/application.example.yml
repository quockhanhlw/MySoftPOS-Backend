server:
  port: ${PORT:8080}

spring:
  application:
    name: mysoftpos-backend

  mail:
    host: ${SPRING_MAIL_HOST:smtp.example.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:YOUR_SMTP_USERNAME}
    password: ${SPRING_MAIL_PASSWORD:YOUR_SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: ${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:10000}
          timeout: ${SPRING_MAIL_SMTP_TIMEOUT:10000}
          writetimeout: ${SPRING_MAIL_SMTP_WRITE_TIMEOUT:10000}

  datasource:
    # Inject the real Aiven JDBC URL via env var.
    # Example: jdbc:mysql://YOUR_AIVEN_HOST:YOUR_AIVEN_PORT/YOUR_DATABASE?sslMode=REQUIRED&serverTimezone=UTC&allowPublicKeyRetrieval=true
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://YOUR_AIVEN_HOST:YOUR_AIVEN_PORT/YOUR_DATABASE?sslMode=REQUIRED&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:YOUR_AIVEN_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD:YOUR_AIVEN_PASSWORD}
  jpa:
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}

app:
  jwt:
    secret: ${APP_JWT_SECRET:YOUR_LONG_RANDOM_JWT_SECRET}
    access-token-expiration: 3600000
    refresh-token-expiration: 604800000
  auth:
    forgot-password:
      code-expiration-minutes: ${APP_FORGOT_PASSWORD_CODE_EXPIRATION_MINUTES:10}
      max-verify-attempts: ${APP_FORGOT_PASSWORD_MAX_VERIFY_ATTEMPTS:5}
      mail-from: ${APP_FORGOT_PASSWORD_MAIL_FROM:no-reply@mysoftpos.local}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
