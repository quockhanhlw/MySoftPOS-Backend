spring:
  datasource:
    url: jdbc:h2:mem:mysoftpos_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false

app:
  jwt:
    secret: TEST_ONLY_CHANGE_ME_TO_A_LONG_RANDOM_SECRET_1234567890
    access-token-expiration: 3600000
    refresh-token-expiration: 604800000

